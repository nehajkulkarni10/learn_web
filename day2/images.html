<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tag</title>
</head>
<body>
    <!-- Image Tag - Adding Image on webpage img tag src-"Copy address" source/location -->
    <!-- 1. From Internet - copy image address and use it -->
    <!-- 1. pexels or unsplash -->
    <h2>Coffee</h2>
     <img src=" https://images.pexels.com/photos/302899/pexels-photo-302899.jpeg "  height="400" width="400">

     <hr>

     <!-- 2. Download and add from your systtem -->
    <h2>Headphones</h2>
      <img src="Headphoness.avif" height="400" width="400">
    <hr>

  <h2>Bike</h2>
   <img src="Bike.avif">
   <hr>
</body>
</html>
